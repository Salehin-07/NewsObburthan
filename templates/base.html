{% load static %}
<!DOCTYPE html>
<html lang="bn" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="{% block meta_description %}ছাত্রকন্ঠ — বাংলাদেশের ছাত্র সমাজের কণ্ঠস্বর{% endblock %}" />
  <title>{% block title %}ছাত্রকন্ঠ{% endblock %} | ছাত্রকন্ঠ</title>

  <!-- Preconnect -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Hind+Siliguri:wght@300;400;500;600&family=DM+Serif+Display:ital@0;1&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet" />

  <!-- Global design system -->
  <link rel="stylesheet" href="{% static 'css/base.css' %}" />
  <link rel="stylesheet" href="{% static 'css/search.css' %}" />
  <link rel="stylesheet" href="{% static 'css/nav.css' %}" />
  <link rel="stylesheet" href="{% static 'css/footer.css' %}" />

  <!-- Page-level styles -->
  {% block extra_css %}{% endblock %}

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="{% static 'img/logo.png' %}" />
</head>
<body>

  <!-- Search Overlay -->
  {% include 'partials/search_overlay.html' %}

  <!-- Navigation -->
  {% include 'partials/nav.html' %}

  <!-- Main Content -->
  <main class="ck-main">
    {% block content %}{% endblock %}
  </main>

  <!-- Footer -->
  {% include 'partials/footer.html' %}

  <!-- Global JS -->
  <script src="{% static 'js/search.js' %}"></script>
  <script src="{% static 'js/nav.js' %}"></script>

  <!-- Page-level scripts -->
  {% block extra_js %}{% endblock %}

</body>
</html>
